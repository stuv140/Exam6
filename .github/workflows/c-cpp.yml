name: 'C++ CI'

on:
  push:
    branches:
      - main
      - feature/github_actions

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4 

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install libboost-test-dev -y

      - name: Configure CMake
        run: cmake . -DPATCH_VERSION=${{ github.run_number }} -DWITH_BOOST_TEST=ON

      - name: Build project
        run: cmake --build .

      - name: Run tests
        run: ctest --output-on-failure

      - name: Display test results (if failed)
        if: failure()
        run: |
          echo "=== Test log ==="
          find . -name "LastTest.log" -exec cat {} \; || true

      - name: Create package
        run: cmake --build . --target package

      - name: Get package version
        run: |
          # Извлекаем версию из CMakeLists.txt
          VERSION=$(grep -oP 'VERSION \K[0-9]+\.[0-9]+\.[0-9]+' CMakeLists.txt)
          echo "Package version: $VERSION"
          echo "PACKAGE_VERSION=$VERSION" >> $GITHUB_ENV
          
          # Проверяем существование пакета
          if [ -f "matrix-${VERSION}-Linux.deb" ]; then
            echo "Package matrix-${VERSION}-Linux.deb found"
          else
            echo "Warning: Expected package matrix-${VERSION}-Linux.deb not found"
            echo "Available packages:"
            ls -la *.deb || echo "No .deb files found"
            # Пробуем найти любой .deb файл
            DEB_FILE=$(ls *.deb 2>/dev/null | head -n 1)
            if [ -n "$DEB_FILE" ]; then
              echo "Found alternative package: $DEB_FILE"
              echo "DEB_FILENAME=$DEB_FILE" >> $GITHUB_ENV
            fi
          fi

      - name: Verify package creation
        run: |
          echo "=== Created packages ==="
          ls -l *.deb || echo "No .deb files found"
          echo "=== Build directory contents ==="
          ls -la

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ env.PACKAGE_VERSION }}
          release_name: Release v${{ env.PACKAGE_VERSION }}
          draft: false
          prerelease: false

      - name: Upload test logs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ github.run_number }}
          path: |
            Testing/Temporary/LastTest.log
            **/LastTest.log

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: matrix-${{ env.PACKAGE_VERSION }}-Linux.deb
          asset_name: matrix-${{ env.PACKAGE_VERSION }}-Linux.deb
          asset_content_type: application/vnd.debian.binary-package
        continue-on-error: true  # Продолжаем даже если не удалось загрузить

      - name: Upload alternative package if exists
        if: env.DEB_FILENAME != ''
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ env.DEB_FILENAME }}
          asset_name: ${{ env.DEB_FILENAME }}
          asset_content_type: application/vnd.debian.binary-package
