name: 'C++ CI'

# --- ИЗМЕНЕНИЕ 1: Запуск только по тегам ---
# Теперь процесс не будет мешать разработке в ветках.
# Он сработает только когда вы создадите тег, например: git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - 'v*' 

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4 # Используйте актуальную версию

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install libboost-test-dev -y

      - name: Configure CMake
        run: cmake . -DPATCH_VERSION=${{ github.run_number }} -DWITH_BOOST_TEST=ON

      - name: Build project
        run: cmake --build .

      - name: Run tests
        run: cmake --build . --target test

      - name: Display test results
        run: |
          ctest --output-on-failure || true
          cat Tests/Temporary/LastTest.log || true

      # --- ИЗМЕНЕНИЕ 2: Создание пакета с понятным именем ---
      # Используем версию из CPack вместо номера запуска.
      - name: Create package with versioned name
        run: |
          cmake --build . --target package
          # Переименовываем файл, используя версию из CMake.
          # Если версия 0.1.0, файл станет matrix-0.1.0-Linux.deb
          mv Matrix-0.1.0-Linux.deb matrix-${{ env.CPACK_PACKAGE_VERSION }}-Linux.deb

      - name: Verify package creation
        run: ls -l matrix-*

      # --- ИЗМЕНЕНИЕ 3: Создание релиза как черновика ---
      - name: Create Release Draft
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }} # Например, v1.0.0
          release_name: Release ${{ github.ref_name }}
          draft: true  # Создаем как черновик, чтобы можно было загрузить файл
          prerelease: false

      - name: Upload test logs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ github.ref_name }}
          path: Tests/Temporary/LastTest.log

      # --- ИЗМЕНЕНИЕ 4: Загрузка актива в черновик ---
      - name: Upload Release Asset
        id: upload-release-asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: matrix-${{ env.CPACK_PACKAGE_VERSION }}-Linux.deb
          asset_name: matrix-${{ env.CPACK_PACKAGE_VERSION }}-Linux.deb
          asset_content_type: application/vnd.debian.binary-package

      # --- ИЗМЕНЕНИЕ 5: Публикация релиза ---
      # Теперь, когда файл загружен, публикуем черновик.
      - name: Publish Release
        id: publish-release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_id: ${{ steps.create_release.outputs.id }} # Указываем ID черновика
          draft: false  # Публикуем!
          prerelease: false
