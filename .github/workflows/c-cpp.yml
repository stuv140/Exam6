name: 'C++ CI'

on:
  push:
    branches:
      - main
      - feature/github_actions

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4 

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install libboost-test-dev -y

      - name: Configure CMake with dynamic version
        run: |
          # Используем номер запуска и SHA коммита для уникальной версии
          VERSION="0.1.${{ github.run_number }}+${{ github.sha }}"
          echo "Building version: $VERSION"
          cmake . -DWITH_BOOST_TEST=ON -DPROJECT_VERSION="$VERSION"

      - name: Build project
        run: cmake --build .

      - name: Run tests
        run: ctest --output-on-failure

      - name: Create package
        run: |
          cmake --build . --target package
          # Получаем версию из CMakeCache
          VERSION=$(grep "CPACK_PACKAGE_VERSION:STATIC=" CMakeCache.txt | cut -d '=' -f2)
          echo "PACKAGE_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Created package with version: $VERSION"

      - name: Verify package creation
        run: ls -l matrix-*.deb

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: build-${{ github.run_number }}
          release_name: "Build #${{ github.run_number }} - ${{ github.sha }}"
          draft: false
          prerelease: true

      - name: Upload test logs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ github.run_number }}
          path: Testing/Temporary/LastTest.log

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: matrix-${{ env.PACKAGE_VERSION }}-Linux.deb
          asset_name: matrix-${{ env.PACKAGE_VERSION }}-Linux.deb
          asset_content_type: application/vnd.debian.binary-package
