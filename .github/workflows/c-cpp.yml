name: 'C++ CI'

on:
  push:
    branches:
      - main
      - feature/github_actions

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4 

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install libboost-test-dev -y

      - name: Set version
        run: |
          # Создаем уникальную версию с временной меткой
          TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
          VERSION="0.1.${{ github.run_number }}-${TIMESTAMP}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Using version: $VERSION"

      - name: Configure CMake
        run: cmake . -DWITH_BOOST_TEST=ON

      - name: Build project
        run: cmake --build .

      - name: Run tests
        run: ctest --output-on-failure

      - name: Create package
        run: |
          cmake --build . --target package
          
          # Переименовываем пакет с уникальной версией
          if [ -f "matrix-0.1.0-Linux.deb" ]; then
            mv matrix-0.1.0-Linux.deb matrix-${{ env.VERSION }}-Linux.deb
          elif [ -f "build/matrix-0.1.0-Linux.deb" ]; then
            cp build/matrix-0.1.0-Linux.deb matrix-${{ env.VERSION }}-Linux.deb
          fi
          
          echo "PACKAGE_FILE=matrix-${{ env.VERSION }}-Linux.deb" >> $GITHUB_ENV

      - name: Verify package
        run: |
          echo "=== Package file ==="
          ls -l ${{ env.PACKAGE_FILE }}

      - name: Create Release with unique tag
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: release-${{ env.VERSION }}
          release_name: "Release ${{ env.VERSION }} - Build #${{ github.run_number }}"
          draft: false
          prerelease: true

      - name: Upload test logs
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ github.run_number }}
          path: Testing/Temporary/LastTest.log

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ env.PACKAGE_FILE }}
          asset_name: ${{ env.PACKAGE_FILE }}
          asset_content_type: application/vnd.debian.binary-package
