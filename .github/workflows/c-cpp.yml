name: 'C++ CI'

on:
  push:
    branches:
      - main
      - feature/github_actions

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4 

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install libboost-test-dev -y

      - name: Configure CMake
        run: cmake . -DWITH_BOOST_TEST=ON

      - name: Build project
        run: cmake --build .

      - name: Run tests
        run: ctest --output-on-failure

      - name: Create package
        run: |
          cmake --build . --target package
          
          # Создаем уникальную версию
          TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
          VERSION="0.1.${{ github.run_number }}-${TIMESTAMP}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Using version: $VERSION"
          
          # Переименовываем пакет
          if [ -f "matrix-0.1.0-Linux.deb" ]; then
            mv matrix-0.1.0-Linux.deb matrix-${VERSION}-Linux.deb
          elif [ -f "build/matrix-0.1.0-Linux.deb" ]; then
            cp build/matrix-0.1.0-Linux.deb matrix-${VERSION}-Linux.deb
          fi
          
          echo "PACKAGE_FILE=matrix-${VERSION}-Linux.deb" >> $GITHUB_ENV

      - name: Upload test logs
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ github.run_number }}
          path: Testing/Temporary/LastTest.log

      - name: Create Release and Upload Asset using GitHub CLI
        run: |
          TAG_NAME="release-${{ env.VERSION }}"
          RELEASE_NAME="Release ${{ env.VERSION }} - Build #${{ github.run_number }}"
          
          # Удаляем старый релиз если существует
          gh release delete "$TAG_NAME" --yes || true
          
          # Создаем новый релиз и загружаем asset
          gh release create "$TAG_NAME" \
            --title "$RELEASE_NAME" \
            --notes "Automated release from workflow run #${{ github.run_number }}" \
            --prerelease \
            ${{ env.PACKAGE_FILE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
