name: 'C++ CI'


on:
  push:
    tags:
      - 'v*' # Например, при создании тега v1.0.0

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Используйте актуальную версию checkout

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install libboost-test-dev -y

      - name: Configure CMake
        run: cmake . -DPATCH_VERSION=${{ github.run_number }} -DWITH_BOOST_TEST=ON

      - name: Build project
        run: cmake --build .

      - name: Run tests
        run: cmake --build . --target test

      - name: Create package (Debian)
        run: cmake --build . --target package

    
      - name: Create and Publish Release
        id: create_release
        uses: actions/create-release@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # github.ref_name содержит только имя тега (например, v1.0.0)
          tag_name: ${{ github.ref_name }} 
          release_name: Release ${{ github.ref_name }}
          draft: false # Создаем и сразу публикуем
          prerelease: false

      # 3. ЗАГРУЗКА АКТИВА (ФАЙЛА)
      - name: Upload Release Asset (.deb)
        id: upload-release-asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Используем upload_url из шага создания релиза
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: Matrix-0.1.0-Linux.deb # Убедитесь, что CMake создает файл с этим именем!
          asset_name: Matrix-0.1.0-Linux.deb
          asset_content_type: application/vnd.debian.binary-package
